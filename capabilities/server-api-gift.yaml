naftiko: 1.0.0-alpha2
info:
  label: "Paytronix Server API \u2014 Gift"
  description: "Guest Engagement \u2014 Gift. 4 operations. Lead operation: Sell Gift Card. Self-contained Naftiko capability covering one Paytronix business surface."
  tags:
  - Paytronix
  - Guest
  - Gift
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PAYTRONIX_INTEGRATION_ID: PAYTRONIX_INTEGRATION_ID
    PAYTRONIX_INTEGRATION_SECRET: PAYTRONIX_INTEGRATION_SECRET
capability:
  consumes:
  - type: http
    namespace: server-api-gift
    baseUri: https://m{merchantId}.api.paytronix.com/rest/26.6
    description: "Paytronix Server API \u2014 Gift. Self-contained, no shared references."
    authentication:
      type: basic
      username: '{{env.PAYTRONIX_INTEGRATION_ID}}'
      password: '{{env.PAYTRONIX_INTEGRATION_SECRET}}'
    resources:
    - name: gift-sell-json
      path: /gift/sell.json
      operations:
      - name: sellGiftCard
        method: POST
        description: Sell Gift Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gift-reload-json
      path: /gift/reload.json
      operations:
      - name: reloadGiftCard
        method: POST
        description: Reload Gift Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gift-balance-json
      path: /gift/balance.json
      operations:
      - name: getGiftBalance
        method: POST
        description: Get Gift Card Balance
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gift-redeem-json
      path: /gift/redeem.json
      operations:
      - name: redeemGiftCard
        method: POST
        description: Redeem Gift Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: server-api-gift-rest
    port: 8080
    description: "REST adapter for Paytronix Server API \u2014 Gift. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/gift/sell
      name: gift-sell
      description: REST surface for Sell Gift Card.
      operations:
      - method: POST
        name: sellGiftCard
        description: Sell Gift Card
        call: server-api-gift.sellGiftCard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gift/reload
      name: gift-reload
      description: REST surface for Reload Gift Card.
      operations:
      - method: POST
        name: reloadGiftCard
        description: Reload Gift Card
        call: server-api-gift.reloadGiftCard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gift/balance
      name: gift-balance
      description: REST surface for Get Gift Card Balance.
      operations:
      - method: POST
        name: getGiftBalance
        description: Get Gift Card Balance
        call: server-api-gift.getGiftBalance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gift/redeem
      name: gift-redeem
      description: REST surface for Redeem Gift Card.
      operations:
      - method: POST
        name: redeemGiftCard
        description: Redeem Gift Card
        call: server-api-gift.redeemGiftCard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-api-gift-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Paytronix Server API \u2014 Gift. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: sell-gift-card
      description: Sell Gift Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-api-gift.sellGiftCard
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: reload-gift-card
      description: Reload Gift Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-api-gift.reloadGiftCard
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-gift-card-balance
      description: Get Gift Card Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: server-api-gift.getGiftBalance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: redeem-gift-card
      description: Redeem Gift Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-api-gift.redeemGiftCard
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
