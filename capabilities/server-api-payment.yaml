naftiko: 1.0.0-alpha2
info:
  label: "Paytronix Server API \u2014 Payment"
  description: "Guest Engagement \u2014 Payment. 2 operations. Lead operation: Recharge Stored Value Card. Self-contained Naftiko capability covering one Paytronix business surface."
  tags:
  - Paytronix
  - Guest
  - Payment
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PAYTRONIX_INTEGRATION_ID: PAYTRONIX_INTEGRATION_ID
    PAYTRONIX_INTEGRATION_SECRET: PAYTRONIX_INTEGRATION_SECRET
capability:
  consumes:
  - type: http
    namespace: server-api-payment
    baseUri: https://m{merchantId}.api.paytronix.com/rest/26.6
    description: "Paytronix Server API \u2014 Payment. Self-contained, no shared references."
    authentication:
      type: basic
      username: '{{env.PAYTRONIX_INTEGRATION_ID}}'
      password: '{{env.PAYTRONIX_INTEGRATION_SECRET}}'
    resources:
    - name: payment-recharge-json
      path: /payment/recharge.json
      operations:
      - name: rechargeStoredValue
        method: POST
        description: Recharge Stored Value Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-savedpaymentmethods-json
      path: /payment/savedPaymentMethods.json
      operations:
      - name: getSavedPaymentMethods
        method: GET
        description: Get Saved Payment Methods
        inputParameters:
        - name: merchantId
          in: query
          type: integer
          required: true
          description: Paytronix-assigned merchant identifier.
        - name: printedCardNumber
          in: query
          type: string
          required: true
          description: Printed card number identifying the account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: server-api-payment-rest
    port: 8080
    description: "REST adapter for Paytronix Server API \u2014 Payment. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/payment/recharge
      name: payment-recharge
      description: REST surface for Recharge Stored Value Card.
      operations:
      - method: POST
        name: rechargeStoredValue
        description: Recharge Stored Value Card
        call: server-api-payment.rechargeStoredValue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment/savedpaymentmethods
      name: payment-savedpaymentmethods
      description: REST surface for Get Saved Payment Methods.
      operations:
      - method: GET
        name: getSavedPaymentMethods
        description: Get Saved Payment Methods
        call: server-api-payment.getSavedPaymentMethods
        with:
          merchantId: rest.merchantId
          printedCardNumber: rest.printedCardNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-api-payment-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Paytronix Server API \u2014 Payment. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: recharge-stored-value-card
      description: Recharge Stored Value Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-api-payment.rechargeStoredValue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-saved-payment-methods
      description: Get Saved Payment Methods
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-api-payment.getSavedPaymentMethods
      with:
        merchantId: tools.merchantId
        printedCardNumber: tools.printedCardNumber
      outputParameters:
      - type: object
        mapping: $.
