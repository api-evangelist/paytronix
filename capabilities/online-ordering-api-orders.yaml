naftiko: 1.0.0-alpha2
info:
  label: "Paytronix Online Ordering API \u2014 Orders"
  description: "Online Ordering \u2014 Orders. 3 operations. Lead operation: Create Order. Self-contained Naftiko capability covering one Paytronix business surface."
  tags:
  - Paytronix
  - Online
  - Orders
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    OPENDINING_API_KEY: OPENDINING_API_KEY
capability:
  consumes:
  - type: http
    namespace: online-ordering-api-orders
    baseUri: https://api.opendining.net
    description: "Paytronix Online Ordering API \u2014 Orders. Self-contained, no shared references."
    authentication:
      type: apikey
      key: X-Api-Key
      value: '{{env.OPENDINING_API_KEY}}'
      placement: header
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createOrder
        method: POST
        description: Create Order
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-orderid
      path: /orders/{orderId}
      operations:
      - name: getOrder
        method: GET
        description: Get Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-orderid
      path: /orders/{orderId}
      operations:
      - name: updateOrder
        method: PUT
        description: Update Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: online-ordering-api-orders-rest
    port: 8080
    description: "REST adapter for Paytronix Online Ordering API \u2014 Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for Create Order.
      operations:
      - method: POST
        name: createOrder
        description: Create Order
        call: online-ordering-api-orders.createOrder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for Get Order.
      operations:
      - method: GET
        name: getOrder
        description: Get Order
        call: online-ordering-api-orders.getOrder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for Update Order.
      operations:
      - method: PUT
        name: updateOrder
        description: Update Order
        call: online-ordering-api-orders.updateOrder
        with:
          orderId: rest.orderId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: online-ordering-api-orders-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Paytronix Online Ordering API \u2014 Orders. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: online-ordering-api-orders.createOrder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: online-ordering-api-orders.getOrder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-order
      description: Update Order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: online-ordering-api-orders.updateOrder
      with:
        orderId: tools.orderId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
