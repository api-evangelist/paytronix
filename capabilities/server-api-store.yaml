naftiko: 1.0.0-alpha2
info:
  label: "Paytronix Server API \u2014 Store"
  description: "Guest Engagement \u2014 Store. 2 operations. Lead operation: Get Nearby Locations. Self-contained Naftiko capability covering one Paytronix business surface."
  tags:
  - Paytronix
  - Guest
  - Store
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PAYTRONIX_INTEGRATION_ID: PAYTRONIX_INTEGRATION_ID
    PAYTRONIX_INTEGRATION_SECRET: PAYTRONIX_INTEGRATION_SECRET
capability:
  consumes:
  - type: http
    namespace: server-api-store
    baseUri: https://m{merchantId}.api.paytronix.com/rest/26.6
    description: "Paytronix Server API \u2014 Store. Self-contained, no shared references."
    authentication:
      type: basic
      username: '{{env.PAYTRONIX_INTEGRATION_ID}}'
      password: '{{env.PAYTRONIX_INTEGRATION_SECRET}}'
    resources:
    - name: store-nearbylocations-json
      path: /store/nearbyLocations.json
      operations:
      - name: getNearbyLocations
        method: GET
        description: Get Nearby Locations
        inputParameters:
        - name: merchantId
          in: query
          type: integer
          required: true
          description: Paytronix-assigned merchant identifier.
        - name: latitude
          in: query
          type: number
          required: true
          description: Search center latitude.
        - name: longitude
          in: query
          type: number
          required: true
          description: Search center longitude.
        - name: maxDistance
          in: query
          type: number
          required: true
          description: Maximum distance in miles.
        - name: maxLocations
          in: query
          type: integer
          required: true
          description: Maximum number of results.
        - name: storeGroupCode
          in: query
          type: string
          required: false
          description: Optional store group filter.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: store-stores-json
      path: /store/stores.json
      operations:
      - name: getStores
        method: GET
        description: Get All Stores
        inputParameters:
        - name: merchantId
          in: query
          type: integer
          required: true
          description: Paytronix-assigned merchant identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: server-api-store-rest
    port: 8080
    description: "REST adapter for Paytronix Server API \u2014 Store. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/store/nearbylocations
      name: store-nearbylocations
      description: REST surface for Get Nearby Locations.
      operations:
      - method: GET
        name: getNearbyLocations
        description: Get Nearby Locations
        call: server-api-store.getNearbyLocations
        with:
          merchantId: rest.merchantId
          latitude: rest.latitude
          longitude: rest.longitude
          maxDistance: rest.maxDistance
          maxLocations: rest.maxLocations
          storeGroupCode: rest.storeGroupCode
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/store/stores
      name: store-stores
      description: REST surface for Get All Stores.
      operations:
      - method: GET
        name: getStores
        description: Get All Stores
        call: server-api-store.getStores
        with:
          merchantId: rest.merchantId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-api-store-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Paytronix Server API \u2014 Store. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: get-nearby-locations
      description: Get Nearby Locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-api-store.getNearbyLocations
      with:
        merchantId: tools.merchantId
        latitude: tools.latitude
        longitude: tools.longitude
        maxDistance: tools.maxDistance
        maxLocations: tools.maxLocations
        storeGroupCode: tools.storeGroupCode
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-stores
      description: Get All Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-api-store.getStores
      with:
        merchantId: tools.merchantId
      outputParameters:
      - type: object
        mapping: $.
