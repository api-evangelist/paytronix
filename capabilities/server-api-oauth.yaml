naftiko: 1.0.0-alpha2
info:
  label: "Paytronix Server API \u2014 OAuth"
  description: "Guest Engagement \u2014 OAuth. 1 operations. Lead operation: Request Guest Token. Self-contained Naftiko capability covering one Paytronix business surface."
  tags:
  - Paytronix
  - Guest
  - OAuth
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PAYTRONIX_INTEGRATION_ID: PAYTRONIX_INTEGRATION_ID
    PAYTRONIX_INTEGRATION_SECRET: PAYTRONIX_INTEGRATION_SECRET
capability:
  consumes:
  - type: http
    namespace: server-api-oauth
    baseUri: https://m{merchantId}.api.paytronix.com/rest/26.6
    description: "Paytronix Server API \u2014 OAuth. Self-contained, no shared references."
    authentication:
      type: basic
      username: '{{env.PAYTRONIX_INTEGRATION_ID}}'
      password: '{{env.PAYTRONIX_INTEGRATION_SECRET}}'
    resources:
    - name: oauth-requestguesttoken-json
      path: /oauth/requestGuestToken.json
      operations:
      - name: requestGuestToken
        method: POST
        description: Request Guest Token
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: server-api-oauth-rest
    port: 8080
    description: "REST adapter for Paytronix Server API \u2014 OAuth. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/oauth/requestguesttoken
      name: oauth-requestguesttoken
      description: REST surface for Request Guest Token.
      operations:
      - method: POST
        name: requestGuestToken
        description: Request Guest Token
        call: server-api-oauth.requestGuestToken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-api-oauth-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Paytronix Server API \u2014 OAuth. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: request-guest-token
      description: Request Guest Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-api-oauth.requestGuestToken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
