apis:
  - aid: paytronix:rest-api
    name: Paytronix Server API
    description: >-
      The Paytronix Server (PXS) REST API exposes 40-plus services for guest
      engagement, including Guest, Enrollment, Transaction, Check, Sale,
      Payment, Gift, Message, Campaign Feedback, Store, and mobile wallet
      services. Authentication is handled through the OAuth Service, with client
      credentials supplied via HTTP Basic, plus email and B2B authentication
      options. Start with the API Primer covering authentication, formatting,
      and versioning.
    humanURL: https://developers.paytronix.com/pxs_api_reference/index.html
    tags:
      - Loyalty
      - Transactions
      - Payments
      - Gift Cards
      - Messaging
    properties:
      - type: Documentation
        url: https://developers.paytronix.com/pxs_api_reference/index.html
      - type: Authentication
        url: https://developers.paytronix.com/pxs_api_reference/oauth.html
      - type: GettingStarted
        url: https://developers.paytronix.com/welcome/index.html
  - aid: paytronix:online-ordering-api
    name: Paytronix Online Ordering API
    description: >-
      The Paytronix Online Ordering API supports building and integrating
      ordering experiences across order methods including in store, online web,
      online app, call in, call center, and drive through. It connects ordering
      systems with the broader Paytronix loyalty and guest engagement platform.
    humanURL: http://docs.opendining.net/
    tags:
      - Online Ordering
      - Restaurant
    properties:
      - type: Documentation
        url: http://docs.opendining.net/
