    name: Paytronix Online Ordering API
    description: >-
      The Paytronix Online Ordering API supports building and integrating ordering experiences across order methods
      including in store, online web, online app, call in, call center, and drive through. It connects ordering systems
      with the broader Paytronix loyalty and guest engagement platform.
