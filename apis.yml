aid: paytronix
name: Paytronix
description: >-
  Paytronix is a cloud-based digital guest engagement platform for restaurants and convenience stores, providing loyalty
  programs, gift and stored-value cards, online ordering, branded mobile apps, messaging, and analytics to more than
  1,800 brands. Paytronix publishes extensive public integration documentation describing a REST-based Server API with
  40-plus services spanning guests, enrollment, transactions, checks, payments, gift, messaging, campaigns, stores, and
  mobile wallet passes. Authentication supports OAuth, client credentials (integration identifier and secret via HTTP
  Basic), and B2B flows. A separate Online Ordering API is documented for ordering integrations, making Paytronix a
  developer-friendly guest engagement provider.
type: Index
