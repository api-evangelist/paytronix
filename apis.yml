apis:
  - aid: paytronix:rest-api
    name: Paytronix Server API
    description: >-
      The Paytronix Server (PXS) REST API exposes 40-plus services for guest engagement, including Guest, Enrollment,
      Transaction, Check, Sale, Payment, Gift, Message, Campaign Feedback, Store, and mobile wallet services.
      Authentication is handled through the OAuth Service, with client credentials supplied via HTTP Basic, plus email
      and B2B authentication options. Start with the API Primer covering authentication, formatting, and versioning.
    humanURL: https://developers.paytronix.com/pxs_api_reference/index.html
    baseURL: https://m{merchantId}.api.paytronix.com/rest/26.6
    tags:
      - Loyalty
      - Transactions
      - Payments
      - Gift Cards
      - Messaging
