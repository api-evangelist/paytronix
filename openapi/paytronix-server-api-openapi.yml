      responses:
        '200':
          description: Gift transaction reply.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GiftReply'
              examples:
                RedeemGiftCard200Example:
                  summary: Default redeemGiftCard 200 response
                  x-microcks-default: true
                  value:
                    result: success
                    pxTransactionId: 'GIFT-44556'
                    printedCardNumber: '70123456789012'
                    currentBalance: 50.00
                    errorCode: string
                    errorMessage: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /payment/recharge.json:
    post:
      operationId: rechargeStoredValue
      summary: Recharge Stored Value Card
      description: >-
        Recharge a stored-value card with a given amount using a saved or new
        payment method.
