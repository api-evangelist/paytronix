components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication with the base64-encoded integration
        identifier and secret (identifier:secret).
    guestBearer:
      type: http
      scheme: bearer
      bearerFormat: OAuth
      description: OAuth bearer token issued by the OAuth Service for guest-scoped operations.
  schemas:
    ErrorReply:
      type: object
      description: Standard failure envelope returned across PXS services.
      properties:
        result:
          type: string
          example: failure
        errorCode:
          type: string
          example: invalid_grant
        errorMessage:
          type: string
          example: The supplied credentials were not valid.
    SimpleReply:
      type: object
      description: Standard success/failure envelope.
      properties:
        result:
          type: string
          example: success
        errorCode: {type: string}
        errorMessage: {type: string}
    CardInfo:
      type: object
      description: Identifies a card for transaction operations.
      properties:
        printedCardNumber: {type: string, example: '60490012345678'}
        magstripe: {type: string}
        cardTemplateCode: {type: string, example: '1'}
    WalletContent:
      type: object
      description: A wallet code and quantity used in add/redeem operations.
      properties:
        walletCode: {type: string, example: '1'}
        quantity: {type: number, example: 10}
        expiration: {type: string, format: date}
    HeaderInfo:
      type: object
      description: Common transaction header. programId is PX, SV, or LP.
      properties:
        merchantId: {type: integer, example: 1000}
        storeCode: {type: string, example: '1'}
        programId: {type: string, example: PX}
        terminal: {type: string, example: '1'}
        operator: {type: string, example: '100'}
        posTransactionId: {type: string}
    GuestTokenRequest:
      type: object
      required: [merchantId, grant_type]
      properties:
        merchantId: {type: integer, example: 1000}
        grant_type:
          type: string
          example: password
          enum: [password, one_time_password, authorization_code, refresh_token, 'http://paytronix.com/oauth/fieldset']
        username: {type: string, example: jdoe}
        password: {type: string, example: 's3cret'}
        scope: {type: string, example: 'user_read account_read'}
        refresh_token: {type: string}
    GuestTokenResponse:
      type: object
      properties:
        access_token: {type: string, example: 9f8c1a2b3c4d5e6f}
        token_type: {type: string, example: bearer}
        expires_in: {type: integer, example: 1800}
        refresh_token: {type: string, example: 1a2b3c4d5e6f7a8b}
        scope: {type: string, example: 'user_read account_read'}
        username: {type: string, example: jdoe}
    AccountInformationReply:
      type: object
      properties:
        result: {type: string, example: success}
        username: {type: string, example: jdoe}
        accountStatus: {type: string, example: ACTIVE}
        queryCardStatus: {type: string, example: ACTIVE}
        registrationStatus: {type: string, example: REGISTERED}
        cardTemplateCode: {type: string, example: '1'}
        tierCode: {type: string, example: GOLD}
        primaryCard: {type: string, example: '60490012345678'}
        additionalCards:
          type: array
          items: {type: string}
        walletBalances:
          type: array
          items: {$ref: '#/components/schemas/WalletBalance'}
    WalletBalance:
      type: object
      properties:
        walletCode: {type: string, example: '1'}
        name: {type: string, example: Points}
        balance: {type: number, example: 1250}
    UserInformationReply:
      type: object
      properties:
        result: {type: string, example: success}
        userFields:
          type: object
          additionalProperties: true
          example: *id001
        primaryCardNumbers:
          type: array
          items: {type: string}
        accountIds:
          type: array
          items: {type: integer, format: int64}
    TransactionHistoryReply:
      type: object
      properties:
        result: {type: string, example: success}
        walletInfo:
          type: array
          items: {$ref: '#/components/schemas/WalletBalance'}
        transactions:
          type: array
          items:
            type: object
            properties:
              transactionId: {type: string}
              datetime: {type: string, format: date-time}
              type: {type: string, example: ACCRUAL}
              walletCode: {type: string}
              amount: {type: number}
              balance: {type: number}
    ChangeCardStatusRequest:
      type: object
      required: [merchantId, printedCardNumber, status]
      properties:
        merchantId: {type: integer, example: 1000}
        printedCardNumber: {type: string, example: '60490012345678'}
        status: {type: string, enum: [ACTIVE, DISABLED], example: DISABLED}
    CreateAndRegisterRequest:
      type: object
      required: [merchantId, cardTemplateCode, setUserFields]
      properties:
        merchantId: {type: integer, example: 1000}
        cardTemplateCode: {type: string, example: '1'}
        enforceUniqueFields:
          type: array
          items: {type: string}
          example: *id002
        setUserFields:
          type: object
          additionalProperties: true
          example: *id003
        setAccountFields:
          type: object
          additionalProperties: true
        sendSmsVerification: {type: boolean}
        smsVerificationCode: {type: string}
    ActivateAndRegisterRequest:
      type: object
      required: [merchantId, printedCardNumber, setUserFields]
      properties:
        merchantId: {type: integer, example: 1000}
        printedCardNumber: {type: string, example: '60490012345678'}
        enforceUniqueFields:
          type: array
          items: {type: string}
        setUserFields:
          type: object
          additionalProperties: true
        setAccountFields:
          type: object
          additionalProperties: true
    EnrollmentReply:
      type: object
      properties:
        result: {type: string, example: success}
        printedCardNumber: {type: string, example: '60490012345678'}
        accountId: {type: integer, format: int64, example: 998877}
        username: {type: string, example: jdoe}
        errorCode: {type: string}
        errorsByField:
          type: object
          additionalProperties: {type: string}
    EnrollmentConfigReply:
      type: object
      properties:
        result: {type: string, example: success}
        config:
          type: object
          properties:
            fields:
              type: array
              items:
                type: object
                properties:
                  name: {type: string, example: email}
                  type: {type: string, example: string}
                  label: {type: string, example: Email Address}
                  required: {type: boolean, example: true}
                  pattern: {type: string}
    TransactionRequest:
      type: object
      required: [headerInfo, cardInfo]
      properties:
        headerInfo: {$ref: '#/components/schemas/HeaderInfo'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
        autoActivateCard: {type: boolean}
    TransactionReply:
      type: object
      properties:
        result: {type: string, example: success}
        pxTransactionId: {type: string, example: 'TXN-12345'}
        maskedCardNumber: {type: string, example: '******5678'}
        enrollmentDate: {type: string, format: date}
        walletBalances:
          type: array
          items: {$ref: '#/components/schemas/WalletBalance'}
    AddRedeemRequest:
      type: object
      required: [headerInfo, cardInfo]
      properties:
        headerInfo: {$ref: '#/components/schemas/HeaderInfo'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
        addWalletContents:
          type: array
          items: {$ref: '#/components/schemas/WalletContent'}
        redeemWalletContents:
          type: array
          items: {$ref: '#/components/schemas/WalletContent'}
    AddRedeemReply:
      type: object
      properties:
        result: {type: string, example: success}
        pxTransactionId: {type: string, example: 'TXN-67890'}
        walletContents:
          type: array
          items: {$ref: '#/components/schemas/WalletBalance'}
    AccountQueryRequest:
      type: object
      required: [headerInfo, accountQueries]
      properties:
        headerInfo: {$ref: '#/components/schemas/HeaderInfo'}
        pageSize: {type: integer, example: 25}
        accountQueries:
          type: array
          items:
            type: object
            properties:
              phone: {type: string}
              email: {type: string}
              firstName: {type: string}
              lastName: {type: string}
              postalCode: {type: string}
    AccountQueryReply:
      type: object
      properties:
        result: {type: string, example: success}
        accounts:
          type: array
          items:
            type: object
            properties:
              accountId: {type: integer, format: int64}
              printedCardNumber: {type: string}
              fieldValues:
                type: object
                additionalProperties: true
    GiftRequest:
      type: object
      required: [merchantId, storeCode, cardInfo, amount]
      properties:
        merchantId: {type: integer, example: 1000}
        storeCode: {type: string, example: '1'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
        amount: {type: number, example: 25.00}
        checkNumber: {type: string}
        cashier: {type: string}
        terminalId: {type: string}
        externalTransactionId: {type: string}
    GiftBalanceRequest:
      type: object
      required: [merchantId, storeCode, cardInfo]
      properties:
        merchantId: {type: integer, example: 1000}
        storeCode: {type: string, example: '1'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
    GiftRedeemRequest:
      allOf:
      - $ref: '#/components/schemas/GiftRequest'
      - type: object
        properties:
          tip: {type: number, example: 5.00}
    GiftReply:
      type: object
      properties:
        result: {type: string, example: success}
        pxTransactionId: {type: string, example: 'GIFT-44556'}
        printedCardNumber: {type: string, example: '70123456789012'}
        currentBalance: {type: number, example: 50.00}
        errorCode: {type: string}
        errorMessage: {type: string}
    RechargeRequest:
      type: object
      required: [merchantId, printedCardNumber, amount, paymentMethod]
      properties:
        merchantId: {type: integer, example: 1000}
        printedCardNumber: {type: string, example: '60490012345678'}
        amount: {type: number, example: 25.00}
        paymentMethod:
          type: object
          properties:
            type: {type: string, example: CREDIT_CARD}
            token: {type: string}
            lastFour: {type: string, example: '4242'}
        address:
          $ref: '#/components/schemas/Address'
    ChargeResponse:
      type: object
      properties:
        result: {type: string, example: success}
        amount: {type: number, example: 25.00}
        cardType: {type: string, example: VISA}
        lastFour: {type: string, example: '4242'}
        processorAuthCode: {type: string, example: 'AUTH123'}
        transactionState: {type: string, example: APPROVED}
    SavedPaymentMethodsReply:
      type: object
      properties:
        result: {type: string, example: success}
        paymentMethods:
          type: array
          items:
            type: object
            properties:
              type: {type: string, example: CREDIT_CARD}
              cardholderName: {type: string, example: Jane Doe}
              lastFour: {type: string, example: '4242'}
              defaultUsages:
                type: array
                items: {type: string}
    Address:
      type: object
      properties:
        address1: {type: string}
        address2: {type: string}
        city: {type: string}
        stateProvince: {type: string}
        postalCode: {type: string}
        country: {type: string, example: US}
    Location:
      type: object
      properties:
        code: {type: string, example: '1'}
        name: {type: string, example: Downtown}
        address: {$ref: '#/components/schemas/Address'}
        latitude: {type: number, format: double, example: 42.3601}
        longitude: {type: number, format: double, example: -71.0589}
        hoursOfOperation: {type: string}
        distance: {type: number, example: 1.2}
        metadata:
          type: object
          additionalProperties: true
    LocationsReply:
      type: object
      properties:
        result: {type: string, example: success}
        locations:
          type: array
          items: {$ref: '#/components/schemas/Location'}
    Check:
      type: object
      description: A POS check with line items used in reward computation and posting.
      properties:
        number: {type: string, example: '4501'}
        openTime: {type: string, format: date-time}
        subtotal: {type: number, example: 42.50}
        items:
          type: array
          items:
            type: object
            properties:
              itemCode: {type: string}
              name: {type: string}
              quantity: {type: number}
              price: {type: number}
    ComputeRewardsRequest:
      type: object
      required: [merchantId, storeCode, check, cardInfo]
      properties:
        merchantId: {type: integer, example: 1000}
        storeCode: {type: string, example: '1'}
        check: {$ref: '#/components/schemas/Check'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
        terminal: {type: string}
        operator: {type: string}
        rewardSelectionMode:
          type: object
          properties:
            mode: {type: string, example: AUTOMATIC}
    PostAndAccrueRequest:
      type: object
      required: [merchantId, storeCode, check, cardInfo]
      properties:
        merchantId: {type: integer, example: 1000}
        storeCode: {type: string, example: '1'}
        check: {$ref: '#/components/schemas/Check'}
        cardInfo: {$ref: '#/components/schemas/CardInfo'}
        autoActivateCard: {type: boolean}
        terminal: {type: string}
        operator: {type: string}
        receiptSettings:
          type: object
          additionalProperties: true
    ComputeRewardsReply:
      type: object
      properties:
        result: {type: string, example: success}
        customerName: {type: string, example: Jane Doe}
        tierCode: {type: string, example: GOLD}
        printedCardNumber: {type: string, example: '60490012345678'}
        itemDiscounts:
          type: array
          items:
            type: object
            properties:
              itemCode: {type: string}
              discountAmount: {type: number}
              rewardName: {type: string}
        subtotalDiscounts:
          type: array
          items:
            type: object
            properties:
              discountAmount: {type: number}
              rewardName: {type: string}
        walletBalances:
          type: array
          items: {$ref: '#/components/schemas/WalletBalance'}
        receiptText: {type: string}
